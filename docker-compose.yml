networks:
  internal: { internal: true }   # NO route to the internet
  external: {}                   # normal bridge, has internet

services:
  external-app:
    build: { context: ., dockerfile: apps/external/Dockerfile }
    networks: [internal, external]   # the single bridge
    ports: ["3000:3000"]
    environment:
      INTERNAL_URL: "http://internal-app:3100"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL_FAST: "${OPENAI_MODEL_FAST:-gpt-4o-mini}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      HIBP_API_KEY: "${HIBP_API_KEY:-}"
      INTELX_API_KEY: "${INTELX_API_KEY:-}"
      TOR_SOCKS_HOST: "tor"
      TOR_SOCKS_PORT: "9050"
    depends_on: [tor]

  tor:
    image: dperson/torproxy
    networks: [external]           # tor needs the internet; SOCKS5 on :9050

  internal-app:
    build: { context: ., dockerfile: apps/internal/Dockerfile }
    networks: [internal]             # sealed: can only reach external-app + research-mcp
    environment:
      EXTERNAL_URL: "http://external-app:3000"
      RESEARCH_MCP_URL: "http://research-mcp:3200/mcp"
      # Meridian Copilot LLM. The sealed container has no internet, so it reaches
      # the model through the gateway's OpenAI-compatible proxy — the API key stays
      # in external-app and never enters the sealed side.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL_FAST: "${OPENAI_MODEL_FAST:-gpt-4o-mini}"
      OPENAI_BASE_URL: "http://external-app:3000/api/llm/v1"
    depends_on: [external-app, research-mcp]

  # Research MCP layer — thin MCP-to-HTTP adapter over external-app's pipeline.
  # The sealed internal-app reaches it over the internal network as an egress hole;
  # it in turn forwards every mission to external-app (the real research fleet).
  research-mcp:
    build: { context: ., dockerfile: apps/research-mcp/Dockerfile }
    networks: [internal, external]   # internal: sealed side can call it; external: reach external-app + host port
    ports: ["3200:3200"]
    environment:
      MCP_PORT: "3200"
      EXTERNAL_URL: "http://external-app:3000"
    depends_on: [external-app]
